<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWF de Mexico</title>
    <link rel="icon" type="image/x-icon" href="images/SWF_ICO.ico">
    <link rel="stylesheet" href="css/estilos.css">
</head>

<body>
    <img id="logo" src="images/SWF-LOGO.png" alt="Logo SWF">
    <div class="login">
        <h1>Iniciar Sesion</h1>
        <form action="" method="post" id="login-form">
            <div class="input-login">
                <label for="username">Nombre: </label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-login">
                <label for="password">Contraseña: </label>
                <input type="password" id="password" name="password" required>
            </div>
            <div>
                <button type="submit" class="btn-principal">Entrar</button>
            </div>
        </form>
    </div>

    <footer>
        <p>@Proyecto final de desarrollo web 2026</p>
    </footer>

    <script src="js/login.js"></script>
</body>

</html>
