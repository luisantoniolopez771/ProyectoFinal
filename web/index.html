<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>SWF de Mexico</title>
    <style>
        body {
            font-family: sans-serif;
            background-color: #272a4d;
        }

        .login {
            border: solid 4px #72273b;
            border-radius: 10px;
            margin: 5% auto;
            max-width: 50%;
            background-color: #ffffff;
        }

        #login-form {
            padding: 1%;
            text-align: center;
            font-size: 24px;
            display: block;
        }

        h1 {
            text-align: center;
        }

        .input-login {
            padding: 1%;
        }

        button {
            border-radius: 5px;
            height: 50px;
            width: 100px;
            background-color: #332247;
            color: white;
            font-weight: bolder;
            margin-top: 2%;
            margin-bottom: 2%;
            font-size: 80%;
            border: solid 1px #332247;
        }

        footer {
            background-color: #72273b;
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 40px;
            text-align: center;
            color: white;
            font-weight: bolder;
        }

        #username {
            font-size: 20px;
            font-family: sans-serif;
            width: 50%;
        }

        #password {
            font-size: 20px;
            font-family: sans-serif;
            width: 47%;
        }

        #tipo_usuario {
            font-size: 20px;
            font-family: sans-serif;
        }

        #logo {
            display: block;
            margin: 20px auto;
            max-width: 250px;
        }
    </style>
</head>

<body>
    <img id="logo" src="images/SWF-LOGO.png">
    <div class="login">
        <h1>Iniciar Sesion</h1>
        <form action="" method="post" id="login-form">
            <div class="input-login">
                <label for="username">Nombre: </label>
                <input type="text" id="username" name="username" required>
            </div>
            <div class="input-login">
                <label for="password">Contraseña: </label>
                <input type="password" id="password" name="password" required>
            </div>
            <div class="input-login">
                <label for="tipo_usuario">Tipo de usuario:</label>
                <select id="tipo_usuario"  name="tipo_usuario" required>
                    <option value="Trabajador">Trabajador</option>
                    <option value="Administrador">Administrador</option>
                </select>
            </div>
            <div>
                <button type="submit">Entrar</button>
            </div>
        </form>
    </div>

    <footer>
        <p>@Proyecto final de desarrollo web 2026</p>
    </footer>

    <script>
        const formulario = document.getElementById('login-form');

        formulario.addEventListener('submit', async function(event) {
            event.preventDefault();

            const usuarioCapturado = document.getElementById('username').value;
            const passwordCapturado = document.getElementById('password').value;
            const rolCapturado = document.getElementById('tipo_usuario').value;

            const datosLogin = {
                usuario: usuarioCapturado,
                password: passwordCapturado,
                rol: rolCapturado
            };

            try {
                const respuesta = await fetch ('http://localhost:3000/api/login', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application.json'
                    },
                    body: JSON.stringify(datosLogin)
                });

            const resultado = await respuesta.json();

            if  (respuesta.ok) {
                alert("¡Bienvenido, " + resultado.mensaje + "!");
            } else {
                alert("Error: " + resultado.error);
            }
            } catch (error) {
                alert("No se pudo conectar con el servidor. Verifica que Node esté corriendo.");
            }
        });
    </script>
</body>

</html>
