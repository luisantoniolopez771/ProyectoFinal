<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWF de Mexico - Gestión de Inventario</title>
    <style>
        /* Estilos base del ecosistema SWF */
        body {
            font-family: sans-serif;
            background-color: #272a4d;
            margin: 0;
            padding-bottom: 60px;
        }

        #logo {
            display: block;
            margin: 20px auto;
            max-width: 200px;
        }

        /* Navegación */
        nav {
            background-color: #332247;
            padding: 15px;
            text-align: center;
            border-bottom: solid 3px #72273b;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        /* Contenedor principal */
        .container {
            border: solid 4px #72273b;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 90%;
            background-color: #ffffff;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h2 { text-align: center; color: #272a4d; margin-top: 0; }

        /* Formulario de Entrada (Ahora todos son inputs de texto) */
        .form-entrada {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid #ddd;
        }

        .form-entrada input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }

        .btn-add {
            background-color: #332247;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add:hover { background-color: #72273b; }

        /* Tabla de Inventario */
        .table-wrapper { overflow-x: auto; }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        thead { background-color: #72273b; color: white; }

        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        /* Botón Eliminar */
        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-delete:hover { background-color: #a71d2a; }

        footer {
            background-color: #72273b;
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 40px;
            text-align: center;
            color: white;
            line-height: 40px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <img id="logo" src="images/SWF-LOGO.png" alt="Logo SWF">

    <nav>
        <a href="#">Inventario</a>
        <a href="#">Entradas/Salidas</a>
        <a href="#">Cerrar Sesión</a>
    </nav>

    <div class="container">
        <h2>Panel de Inventario</h2>

        <div class="form-entrada">
            <input type="text" id="nombre" placeholder="Nombre">
            <input type="text" id="marca" placeholder="Marca">
            <input type="text" id="medida" placeholder="Medida">
            <input type="text" id="categoria" placeholder="Categoría">
            <input type="text" id="ubicacion" placeholder="Ubicación">
            <input type="number" id="stock" placeholder="Stock">
            <button class="btn-add" onclick="agregarFila()">+ Registrar</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Marca</th>
                        <th>Medida</th>
                        <th>Categoría</th>
                        <th>Ubicación</th>
                        <th>Stock</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-inventario">
                    </tbody>
            </table>
        </div>
    </div>

    <footer>
        @Proyecto final de desarrollo web 2026
    </footer>

    <script>
        function agregarFila() {
            // Referencias a los campos
            const inputs = {
                nombre: document.getElementById('nombre'),
                marca: document.getElementById('marca'),
                medida: document.getElementById('medida'),
                categoria: document.getElementById('categoria'),
                ubicacion: document.getElementById('ubicacion'),
                stock: document.getElementById('stock')
            };

            // Validación: Al menos nombre, categoría y stock deben tener datos
            if (!inputs.nombre.value.trim() || !inputs.categoria.value.trim() || inputs.stock.value === "") {
                alert("Por favor rellena al menos Nombre, Categoría y Stock.");
                return;
            }

            const tbody = document.getElementById('tabla-inventario');
            const row = tbody.insertRow();

            // Llenado de celdas
            row.innerHTML = `
                <td>${inputs.nombre.value}</td>
                <td>${inputs.marca.value}</td>
                <td>${inputs.medida.value}</td>
                <td>${inputs.categoria.value}</td>
                <td>${inputs.ubicacion.value}</td>
                <td>${inputs.stock.value}</td>
                <td><button class="btn-delete" onclick="eliminarFila(this)">Eliminar</button></td>
            `;

            // Limpieza de campos y regreso del foco al inicio
            Object.values(inputs).forEach(input => input.value = "");
            inputs.nombre.focus();
        }

        function eliminarFila(btn) {
            if (confirm("¿Seguro que quieres eliminar este registro?")) {
                const fila = btn.parentNode.parentNode;
                fila.parentNode.removeChild(fila);
            }
        }
    </script>
</body>
</html>
