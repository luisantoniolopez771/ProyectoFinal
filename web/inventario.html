<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWF de Mexico - Gestión de Inventario</title>

    <link rel="icon" type="image/x-icon" href="images/SWF_ICO.ico">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <style>
        /* Estilos base del ecosistema SWF */
        body {
            font-family: "Open Sans", light;
            background-color: #272a4d;
            margin: 0;
            padding-bottom: 60px;
        }

        #logo {
            display: block;
            margin: 20px auto;
            max-width: 200px;
        }

        /* Navegación */
        nav {
            background-color: #332247;
            padding: 15px;
            text-align: center;
            border-bottom: solid 3px #72273b;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        /* Contenedor principal */
        .container {
            border: solid 4px #72273b;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 90%;
            background-color: #ffffff;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        h2 {
            text-align: center;
            color: #272a4d;
            margin-top: 0;
        }

        /* Formulario de Entrada (Ahora todos son inputs de texto) */
        .form-entrada {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid #ddd;
        }

        .form-entrada input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }

        .btn-add {
            background-color: #332247;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add:hover {
            background-color: #72273b;
        }

        /* Tabla de Inventario */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        thead {
            background-color: #72273b;
            color: white;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        /* Botón Eliminar */
        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-delete:hover {
            background-color: #a71d2a;
        }

        footer {
            background-color: #72273b;
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 40px;
            text-align: center;
            color: white;
            line-height: 40px;
            font-weight: bold;
        }
    </style>
</head>

<body>

    <img id="logo" src="images/SWF-LOGO.png" alt="Logo SWF">

    <nav>
        <a href="inventario.html">Inventario</a>
        <a href="transacciones.html">Entradas/Salidas</a>
        <a href="#">Cerrar Sesión</a>
    </nav>

    <div class="container">
        <h2>Panel de Inventario</h2>
        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Marca</th>
                        <th>Medida</th>
                        <th>Categoría</th>
                        <th>Ubicación</th>
                        <th>Modelo</th>
                        <th>Color</th>
                        <th>Area Bordado</th>
                        <th>Maquina</th>
                        <th>Stock Actual</th>
                    </tr>
                </thead>
                <tbody id="tabla-inventario">
                </tbody>
            </table>
        </div>
    </div>

    <footer>
        @Proyecto final de desarrollo web 2026
    </footer>

    <script>
        async function cargarInventario() {
            try {
                const respuesta = await fetch('http://localhost:3000/api/inventario');

                const resultado = await respuesta.json();

                console.log('Resultado consulta: ', resultado.datos)
                if (respuesta.ok) {

                    const tbody = document.getElementById('tabla-inventario');
                    tbody.innerHTML = "";

                    resultado.datos.forEach(pieza => {

                        const fila = tbody.insertRow();
                        fila.innerHTML = `
                            <td>${pieza.NOMBRE}</td>
                            <td>${pieza.MARCA}</td>
                            <td>${pieza.MEDIDA}</td>
                            <td>${pieza.CATEGORIA}</td>
                            <td>${pieza.ANAQUEL} - ${pieza.NIVEL}</td>
                            <td>${pieza.MODELO}</td>
                            <td>${pieza.COLOR_TIPO}</td>
                            <td>${pieza.AREA_BORDADO}</td>
                            <td>${pieza.MAQUINA}</td>
                            <td>${pieza.STOCK_ACTUAL}</td>
                `;
                    });

                } else {
                    console.error("Error desde el servidor:", resultado.error);
                }

            } catch (error) {
                console.error("No se pudo conectar al backend:", error);
            }
        }

        cargarInventario();
    </script>
</body>

</html>
