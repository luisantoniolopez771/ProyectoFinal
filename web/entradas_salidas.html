<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SWF de Mexico - Gestión de Inventario</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Open+Sans:ital,wght@0,300..800;1,300..800&display=swap"
        rel="stylesheet">
    <style>
        /* Estilos base del ecosistema SWF */
        body {
            font-family: "Open Sans", light;
            background-color: #272a4d;
            margin: 0;
            padding-bottom: 60px;
        }

        #logo {
            display: block;
            margin: 20px auto;
            max-width: 200px;
        }

        /* Navegación */
        nav {
            background-color: #332247;
            padding: 15px;
            text-align: center;
            border-bottom: solid 3px #72273b;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 15px;
            font-weight: bold;
        }

        /* Contenedor principal */
        .container {
            border: solid 4px #72273b;
            border-radius: 10px;
            margin: 20px auto;
            max-width: 90%;
            background-color: #ffffff;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
        }

        h2 {
            text-align: center;
            color: #272a4d;
            margin-top: 0;
        }

        /* Formulario de Entrada (Ahora todos son inputs de texto) */
        .form-entrada {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            background: #f8f9fa;
            padding: 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            border: 1px solid #ddd;
        }

        .form-entrada input {
            padding: 10px;
            border: 1px solid #ccc;
            border-radius: 4px;
            outline: none;
        }

        .btn-add {
            background-color: #332247;
            color: white;
            border: none;
            padding: 10px;
            border-radius: 4px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .btn-add:hover {
            background-color: #72273b;
        }

        /* Tabla de Inventario */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 10px;
        }

        thead {
            background-color: #72273b;
            color: white;
        }

        th,
        td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #eee;
        }

        /* Botón Eliminar */
        .btn-delete {
            background-color: #dc3545;
            color: white;
            border: none;
            padding: 6px 10px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 12px;
        }

        .btn-delete:hover {
            background-color: #a71d2a;
        }

        footer {
            background-color: #72273b;
            position: fixed;
            bottom: 0;
            width: 100%;
            height: 40px;
            text-align: center;
            color: white;
            line-height: 40px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <img id="logo" src="images/SWF-LOGO.png" alt="Logo SWF">

    <nav>
        <a href="inventario.html">Inventario</a>
        <a href="entradas_salidas.html">Entradas/Salidas</a>
        <a href="#">Cerrar Sesión</a>
    </nav>

    <div class="container">
        <h2>Panel de Inventario</h2>

        <div class="form-entrada">

            <select id="categoria">
                <option value="">Selecciona una Categoría...</option>
            </select>

            <select id="nombre">
                <option value="">Selecciona un Nombre...</option>
            </select>

            <select id="marca">
                <option value="">Selecciona una Marca...</option>
            </select>

            <select id="medida">
                <option value="">Selecciona una Medida...</option>
            </select>

            <select id="ubicacion">
                <option value="">Selecciona una Ubicación...</option>
            </select>

            <input type="number" id="stock" placeholder="Cantidad">

            <button class="btn-add" onclick="agregarFila()">+ Registrar</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Nombre</th>
                        <th>Marca</th>
                        <th>Medida</th>
                        <th>Categoría</th>
                        <th>Ubicación</th>
                        <th>Stock</th>
                        <th>Acción</th>
                    </tr>
                </thead>
                <tbody id="tabla-inventario">
                </tbody>
            </table>
        </div>
    </div>

    <footer>
        @Proyecto final de desarrollo web 2026
    </footer>
<script>
     async function cargarCatalogos() {
            try {
                const respuesta = await fetch('http://localhost:3000/api/catalogos');
                const resultado = await respuesta.json();

                if (resultado.exito) {

                    const selectCategoria = document.getElementById('categoria');
                    resultado.categorias.forEach(cat => {
                        const opcion = `<option value="${cat.ID_CATEGORIA}"> ${cat.NOMBRE_CATEGORIA} </option>`;
                        selectCategoria.innerHTML += opcion;
                    });

                    const selectUbicacion = document.getElementById('ubicacion');
                    resultado.ubicaciones.forEach(ubi => {
                        const opcion = `<option value="${ubi.ID_UBICACION}"> ${ubi.ANAQUEL} - ${ubi.NIVEL} </option>`;
                        selectUbicacion.innerHTML += opcion;
                    });

                    const selectMedida = document.getElementById('medida');
                    resultado.medidas.forEach(med => {
                        const opcion = `<option value="${med.ID_MEDIDA}"> ${med.VALOR_MEDIDA} </option>`;
                        selectMedida.innerHTML += opcion;
                    });

                    const selectMarca = document.getElementById('marca');
                    resultado.marcas.forEach(mar => {
                        const opcion = `<option value="${mar.ID_MARCA}"> ${mar.NOMBRE_MARCA} </option>`;
                        selectMarca.innerHTML += opcion;
                    });
                }
            } catch (error) {
                console.error("Error al cargar listas:", error);
            }
        }

        const selectCategoria = document.getElementById('categoria');
        const selectNombre = document.getElementById('nombre');
        const selectMedida = document.getElementById('medida');

        selectCategoria.addEventListener('change', async function () {
            const idCatSelect = this.value;

            selectNombre.innerHTML = '<option value="">Selecciona un Nombre...</option>';
            selectMedida.innerHTML = '<option value="">Selecciona una Medida...</option>';

            if (!idCatSelect) return;

            try {
                const respuesta = await fetch(`http://localhost:3000/api/piezas-por-categoria/${idCatSelect}`);
                const resultado = await respuesta.json();

                if (resultado.exito) {
                    resultado.nombres.forEach(pieza => {
                        const opcion = `<option value="${pieza.ID_PIEZA}">${pieza.NOMBRE}</option>`;
                        selectNombre.innerHTML += opcion;
                    });

                    resultado.medidas.forEach(medida => {
                        const opcion = `<option value="${medida.ID_MEDIDA}">${medida.VALOR_MEDIDA}</option>`;
                        selectMedida.innerHTML += opcion;
                    })
                }
            } catch (error) {
                console.error("Error al buscar los nombres por categoria: ", error)
            }
        });

        cargarCatalogos();
</script>
</body>
